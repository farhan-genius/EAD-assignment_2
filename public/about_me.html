<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Assignment</title>

<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body{
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container{
        background: white;
        width: 500px;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        text-align: center;
        animation: fadeIn 1s ease-in-out;
    }

    .container h1{
        color: #2c5364;
        margin-bottom: 20px;
        font-size: 28px;
    }

    .info{
        text-align: left;
        margin-top: 15px;
    }

    .info p{
        padding: 10px;
        margin: 8px 0;
        background: #f1f1f1;
        border-left: 5px solid #2c5364;
        border-radius: 5px;
        font-size: 18px;
    }

    .info span{
        font-weight: bold;
        color: #203a43;
    }

    .btn{
        margin-top: 20px;
    }

    .btn a{
        text-decoration: none;
        background: #2c5364;
        color: white;
        padding: 12px 25px;
        border-radius: 8px;
        transition: 0.3s;
        font-size: 16px;
    }

    .btn a:hover{
        background: #203a43;
    }

    @keyframes fadeIn{
        from{
            opacity: 0;
            transform: translateY(-20px);
        }
        to{
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>My Info</h1>

    <div class="info">
        <p><span>Name:</span> Hasnain Ali Shah</p>
        <p><span>CMS-ID:</span> 023-23-0193</p>
        <p><span>Course:</span> EAD</p>
        <p><span>Topic:</span> Static Files</p>
        <p><span>Assigned By:</span> Sir Azhar Durrani</p>
        <p><span>Date:</span> 18/04/2026</p>
    </div>

    <div class="btn">
        <a href="/">Back</a>
    </div>
</div>

</body>
</html>
